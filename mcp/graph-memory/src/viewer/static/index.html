<!DOCTYPE html><html lang=en><head><meta charset=utf-8><title>Memory Graph MCP</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,system-ui,sans-serif;background:#0f1f0f;color:#e0e0e0;display:flex;height:100vh;overflow:hidden}#sidebar{width:300px;background:#0e1c0e;padding:20px;overflow-y:auto;border-right:1px solid #2a5a2a}#sidebar h1{font-size:16px;color:#64ff64;margin-bottom:16px}#search{width:100%;padding:8px 12px;background:#142314;border:1px solid #2a5a2a;border-radius:6px;color:#e0e0e0;margin-bottom:12px;font-size:14px}.filter-btn{padding:4px 12px;border:1px solid #2a5a2a;border-radius:12px;background:0;color:#8ab88a;font-size:12px;cursor:pointer;margin:2px}.filter-btn.active{background:#64ff64;color:#0f1f0f;border-color:#64ff64}#filters{margin-bottom:16px}#info{background:#142314;border-radius:8px;padding:16px;border:1px solid #2a5a2a}#info .empty{color:#8ab88a;font-size:13px}#info .node-title{font-weight:700;font-size:15px;color:#64ff64;margin-bottom:8px;word-break:break-word}#info table{border-collapse:collapse;width:100%;font-size:11px}#info th,#info td{text-align:left;border:1px solid #2a5a2a;padding:4px 6px}#info th{font-weight:600;background:#0a1a0a;width:30%;white-space:nowrap}#info code{font-family:inherit;background:#1a3a1a;padding:1px 4px;border-radius:3px}#graph{flex:1;background:#0a170a;position:relative}#graph svg{width:100%;height:100%}.nc{fill:#4a9eff}.np{fill:#4ade80}.npe{fill:#fb923c}.nm{fill:#a78bfa}.nco{fill:#94a3b8}.nd{fill:#64748b}.edge{stroke:#5ab85a;stroke-width:2.5;stroke-opacity:.9}.muted{opacity:.3}.el{fill:#80c080;font-size:13px;text-anchor:middle;pointer-events:none}.el-bg{fill:#0a170a;rx:3;ry:3}.nlabel{fill:#e0e0e0;font-size:15px;text-anchor:middle;pointer-events:none;font-weight:600;text-shadow:0 1px 2px rgba(0,0,0,.8)}#legend{position:absolute;top:12px;left:12px;background:rgba(14,28,14,.9);border:1px solid #2a5a2a;border-radius:8px;padding:10px 14px;z-index:20;font-size:12px;line-height:1.8}#legend .lrow{display:flex;align-items:center;gap:8px}#legend .lsw{display:inline-block;width:12px;height:12px;border-radius:50%;flex-shrink:0}#refresh{position:absolute;top:16px;right:16px;background:#142314;border:1px solid #2a5a2a;border-radius:6px;padding:8px 16px;color:#e0e0e0;cursor:pointer;z-index:20}#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#8ab88a;font-size:16px}</style></head><body><div id=sidebar><h1>Memory Graph MCP</h1><p id=stats></p><input id=search placeholder="Search nodes..."><div id=filters><button class="filter-btn active" data-type=all>All</button><button class=filter-btn data-type=code>Code</button><button class=filter-btn data-type=project>Project</button><button class=filter-btn data-type=person>Person</button><button class=filter-btn data-type=memory>Memory</button><button class=filter-btn data-type=concept>Concept</button></div><div id=info><div class=empty>Click a node to inspect</div></div></div><div id=graph><div id=legend><div class=lrow><span class=lsw style=background:#4a9eff></span>code</div><div class=lrow><span class=lsw style=background:#4ade80></span>project</div><div class=lrow><span class=lsw style=background:#fb923c></span>person</div><div class=lrow><span class=lsw style=background:#a78bfa></span>memory</div><div class=lrow><span class=lsw style=background:#94a3b8></span>concept</div></div><div id=loading>Loading graph...</div><button id=refresh>Refresh</button></div><script src="https://d3js.org/d3.v7.min.js"></script><script>let state={nodes:[],edges:[],filtered:[],type:"all",query:""};let sim=null;const cc={code:"nc",project:"np",person:"npe",memory:"nm",concept:"nco"};async function load(){loading.style.display="block";try{const r=await fetch("/api/graph");const d=await r.json();state.nodes=d.nodes||[];state.edges=d.edges||[];apply();render()}catch(e){loading.textContent="Error: "+e.message}}function apply(){const q=state.query.toLowerCase();state.filtered=state.nodes.filter(n=>(state.type==="all"||n.type===state.type)&&(!q||(n.name||"").toLowerCase().includes(q)||(n.details||"").toLowerCase().includes(q)))}function render(){const w=graph.clientWidth,h=graph.clientHeight;d3.select("#graph svg").remove();const svg=d3.select("#graph").append("svg").attr("width",w).attr("height",h);const g=svg.append("g");svg.call(d3.zoom().scaleExtent([.1,4]).on("zoom",e=>g.attr("transform",e.transform)));if(!state.filtered.length){g.append("text").attr("x",w/2).attr("y",h/2).attr("text-anchor","middle").attr("fill","#8892b0").text("No nodes. Import a file first.");loading.style.display="none";return}if(sim)sim.stop();state.edges.forEach(e=>{if(typeof e.source==="object")e.source=e.source.id;if(typeof e.target==="object")e.target=e.target.id});const ids=new Set(state.filtered.map(n=>n.id));const fe=state.edges.filter(e=>ids.has(e.source)&&ids.has(e.target));const clonedEdges=fe.map(e=>({...e}));sim=d3.forceSimulation(state.filtered).force("link",d3.forceLink(clonedEdges).id(d=>d.id).distance(180)).force("charge",d3.forceManyBody().strength(-600)).force("center",d3.forceCenter(w/2,h/2)).force("collision",d3.forceCollide(40));const link=g.selectAll("line").data(clonedEdges).enter().append("line").attr("class","edge");const elg=g.selectAll("g.elg").data(clonedEdges).enter().append("g").attr("class","elg");elg.append("rect").attr("class","el-bg");elg.append("text").attr("class","el").attr("fill","#a0c4e0").attr("text-anchor","middle").attr("pointer-events","none").text(d=>d.type);elg.each(function(){const t=this.querySelector("text"),r=this.querySelector("rect");if(t&&r){const b=t.getBBox();r.setAttribute("x",b.x-4);r.setAttribute("y",b.y-2);r.setAttribute("width",b.width+8);r.setAttribute("height",b.height+4)}});const ng=g.selectAll("g.node").data(state.filtered).enter().append("g").attr("class","node").call(d3.drag().on("start",(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y}).on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y}).on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null})).on("click",(e,d)=>{const h=document.getElementById("info");let html="<div class=\"node-title\">"+(d.name||d.id)+"</div>";html+="<table>";html+="<tr><th>Type</th><td>"+d.type+"</td></tr>";if(d.language)html+="<tr><th>Language</th><td>"+d.language+"</td></tr>";if(d.file_path)html+="<tr><th>File</th><td>"+d.file_path+"</td></tr>";if(d.signature)html+="<tr><th>Signature</th><td><code>"+d.signature+"</code></td></tr>";if(d.details)html+="<tr><th>Details</th><td>"+d.details.substring(0,200)+"</td></tr>";html+="</table>";const rels=state.edges.filter(e=>e.source===d.id||e.target===d.id||(typeof e.source==="object"&&e.source.id===d.id)||(typeof e.target==="object"&&e.target.id===d.id));if(rels.length){html+="<br><b>Relationships ("+rels.length+"):</b><ul style='margin-top:4px;padding-left:16px;font-size:12px'>";rels.forEach(r=>{const src=(typeof r.source==="object"?r.source.id:r.source)===d.id?"this":r.source;const tgt=(typeof r.target==="object"?r.target.id:r.target)===d.id?"this":r.target;html+="<li><span style='color:#64ff64'>"+r.type+"</span>: "+src+" → "+tgt+"</li>"});html+="</ul>"}h.innerHTML=html});ng.append("circle").attr("r",10).attr("class",d=>cc[d.type]||"nd").style("cursor","pointer");if(state.filtered.length<=200)ng.append("text").attr("class","nlabel").attr("dy",24).text(d=>d.name||"");sim.on("tick",()=>{link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);elg.attr("transform",d=>"translate("+((d.source.x+d.target.x)/2)+","+((d.source.y+d.target.y)/2)+")");ng.attr("transform",d=>"translate("+d.x+","+d.y+")")});loading.style.display="none"}document.getElementById("search").addEventListener("input",e=>{state.query=e.target.value;apply();render()});document.getElementById("refresh").addEventListener("click",load);document.querySelectorAll(".filter-btn").forEach(b=>b.addEventListener("click",function(){document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));this.classList.add("active");state.type=this.dataset.type;apply();render()}));window.addEventListener("resize",()=>{if(state.filtered.length)render()});stats=document.getElementById("stats");const origLoad=load;load=async function(){await origLoad();stats.innerHTML="Nodes: "+state.nodes.length+" Edges: "+state.edges.length};const{search:searchEl,refresh:refreshBtn,graph:graphEl}=Object.fromEntries(["search","refresh","graph"].map(id=>[id,document.getElementById(id)]));load()</script></body></html>
