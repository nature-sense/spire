<!DOCTYPE html><html lang=en><head><meta charset=utf-8><title>Graph Viewer</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;display:flex;height:100vh;overflow:hidden}#sidebar{width:300px;background:#16213e;padding:20px;overflow-y:auto;border-right:1px solid #2a3a6e}#sidebar h1{font-size:20px;color:#64ffda;margin-bottom:16px}#search{width:100%;padding:8px 12px;background:#1a1a3e;border:1px solid #2a3a6e;border-radius:6px;color:#e0e0e0;margin-bottom:12px;font-size:14px}.filter-btn{padding:4px 12px;border:1px solid #2a3a6e;border-radius:12px;background:0;color:#8892b0;font-size:12px;cursor:pointer;margin:2px}.filter-btn.active{background:#64ffda;color:#1a1a2e;border-color:#64ffda}#filters{margin-bottom:16px}#info{background:#1a1a3e;border-radius:8px;padding:16px;border:1px solid #2a3a6e}#info .empty{color:#8892b0;font-size:13px}#graph{flex:1;background:#0f0f1f;position:relative}#graph svg{width:100%;height:100%}.nc{fill:#4a9eff}.np{fill:#4ade80}.npe{fill:#fb923c}.nm{fill:#a78bfa}.nco{fill:#94a3b8}.nd{fill:#64748b}.edge{stroke:#334155;stroke-width:1.5;stroke-opacity:.6}.nlabel{fill:#94a3b8;font-size:8px;text-anchor:middle;pointer-events:none}#refresh{position:absolute;top:16px;right:16px;background:#1a1a3e;border:1px solid #2a3a6e;border-radius:6px;padding:8px 16px;color:#e0e0e0;cursor:pointer;z-index:20}#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#8892b0;font-size:16px}</style></head><body><div id=sidebar><h1>Graph Viewer</h1><p id=stats></p><input id=search placeholder="Search nodes..."><div id=filters><button class="filter-btn active" data-type=all>All</button><button class=filter-btn data-type=code>Code</button><button class=filter-btn data-type=project>Project</button><button class=filter-btn data-type=person>Person</button><button class=filter-btn data-type=memory>Memory</button><button class=filter-btn data-type=concept>Concept</button></div><div id=info><div class=empty>Click a node to inspect</div></div></div><div id=graph><div id=loading>Loading graph...</div><button id=refresh>Refresh</button></div><script src="https://d3js.org/d3.v7.min.js"></script><script>let state={nodes:[],edges:[],filtered:[],type:"all",query:""};let sim=null;const cc={code:"nc",project:"np",person:"npe",memory:"nm",concept:"nco"};async function load(){loading.style.display="block";try{const r=await fetch("/api/graph");const d=await r.json();state.nodes=d.nodes||[];state.edges=d.edges||[];apply();render()}catch(e){loading.textContent="Error: "+e.message}}function apply(){const q=state.query.toLowerCase();state.filtered=state.nodes.filter(n=>(state.type==="all"||n.type===state.type)&&(!q||(n.name||"").toLowerCase().includes(q)||(n.details||"").toLowerCase().includes(q)))}function render(){const w=graph.clientWidth,h=graph.clientHeight;d3.select("#graph svg").remove();const svg=d3.select("#graph").append("svg").attr("width",w).attr("height",h);const g=svg.append("g");svg.call(d3.zoom().scaleExtent([.1,4]).on("zoom",e=>g.attr("transform",e.transform)));if(!state.filtered.length){g.append("text").attr("x",w/2).attr("y",h/2).attr("text-anchor","middle").attr("fill","#8892b0").text("No nodes. Import a file first.");loading.style.display="none";return}if(sim)sim.stop();const ids=new Set(state.filtered.map(n=>n.id));const fe=state.edges.filter(e=>ids.has(e.source)&&ids.has(e.target));sim=d3.forceSimulation(state.filtered).force("link",d3.forceLink(fe).id(d=>d.id).distance(80)).force("charge",d3.forceManyBody().strength(-300)).force("center",d3.forceCenter(w/2,h/2)).force("collision",d3.forceCollide(12));const link=g.selectAll("line").data(fe).enter().append("line").attr("class","edge");const ng=g.selectAll("g").data(state.filtered).enter().append("g").call(d3.drag().on("start",(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y}).on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y}).on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null})).on("click",(e,d)=>{const h=document.getElementById("info");h.innerHTML="<b>"+(d.name||d.id)+"</b><br>Type: "+d.type+(d.language?"<br>Lang: "+d.language:"")+(d.file_path?"<br>File: "+d.file_path:"")+(d.signature?"<br><code>"+d.signature+"</code>":"")+(d.details?"<br>"+d.details.substring(0,200):"")});ng.append("circle").attr("r",6).attr("fill",d=>cc[d.type]?"":"").attr("class",d=>cc[d.type]||"nd").style("cursor","pointer");if(state.filtered.length<=200)ng.append("text").attr("class","nlabel").attr("dy",14).text(d=>(d.name||"").substring(0,15));sim.on("tick",()=>{link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);ng.attr("transform",d=>"translate("+d.x+","+d.y+")")});loading.style.display="none"}document.getElementById("search").addEventListener("input",e=>{state.query=e.target.value;apply();render()});document.getElementById("refresh").addEventListener("click",load);document.querySelectorAll(".filter-btn").forEach(b=>b.addEventListener("click",function(){document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));this.classList.add("active");state.type=this.dataset.type;apply();render()}));window.addEventListener("resize",()=>{if(state.filtered.length)render()});stats=document.getElementById("stats");const origLoad=load;load=async function(){await origLoad();stats.innerHTML="Nodes: "+state.nodes.length+" Edges: "+state.edges.length};const{search:searchEl,refresh:refreshBtn,graph:graphEl}=Object.fromEntries(["search","refresh","graph"].map(id=>[id,document.getElementById(id)]));load()</script></body></html>
